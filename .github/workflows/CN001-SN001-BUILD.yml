name: CD ESP-IDF Release Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Derive release version from tag
        shell: bash
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Build ESP-IDF project
        shell: bash
        run: |
          export IDF_TARGET=esp32s3
          . /opt/esp/idf/export.sh
          idf.py fullclean build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-build
          path: |
            build/
            .github/RELEASE.md
          retention-days: 30

      - name: Install Backblaze B2 SDK
        shell: bash
        run: |
          export IDF_TARGET=esp32s3
          . /opt/esp/idf/export.sh
          python -m pip install --no-cache-dir b2sdk

      - name: Upload firmware and version to Backblaze
        shell: bash
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          export IDF_TARGET=esp32s3
          . /opt/esp/idf/export.sh
          python .github/scripts/upload_backblaze.py